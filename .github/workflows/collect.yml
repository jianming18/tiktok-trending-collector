name: collect-tiktok-trending

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,8,16 * * *"

permissions:
  contents: write

concurrency:
  group: tiktok-trending-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Select MS_TOKEN from pool
        env:
          MS_TOKEN_POOL: ${{ secrets.MS_TOKEN_POOL }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          import random

          raw = os.environ.get("MS_TOKEN_POOL", "")
          pool = [line.strip() for line in raw.splitlines() if line.strip()]

          if not pool:
              raise SystemExit("MS_TOKEN_POOL is empty")

          event_name = os.environ.get("EVENT_NAME", "")

          index = random.randrange(len(pool))

          if event_name == "schedule":
              reason = "schedule-random"
          else:
              reason = "manual-random"

          token = pool[index]

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"MS_TOKEN={token}\n")
              f.write(f"TOKEN_INDEX={index}\n")
              f.write(f"TOKEN_POOL_SIZE={len(pool)}\n")
              f.write(f"TOKEN_REASON={reason}\n")

          print(f"Selected token index: {index}")
          print(f"Token pool size: {len(pool)}")
          print(f"Reason: {reason}")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps webkit

      - name: Run collector
        env:
          MS_TOKEN: ${{ env.MS_TOKEN }}
          PROXY_FILE_URL: ${{ vars.PROXY_FILE_URL || 'https://raw.githubusercontent.com/jianming18/proxiesus-updater/main/proxiesus.txt' }}
          PROXY_FILE_TIMEOUT_SECONDS: ${{ vars.PROXY_FILE_TIMEOUT_SECONDS || '30' }}
          PROXY_FILE_MAX_RETRIES: ${{ vars.PROXY_FILE_MAX_RETRIES || '3' }}
          TRENDING_COUNT: ${{ vars.TRENDING_COUNT || '1' }}
          TIKTOK_BROWSER: webkit
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
          TOKEN_INDEX: ${{ env.TOKEN_INDEX }}
          TOKEN_POOL_SIZE: ${{ env.TOKEN_POOL_SIZE }}
          TOKEN_REASON: ${{ env.TOKEN_REASON }}
        run: |
          echo "Using token index: $TOKEN_INDEX / $TOKEN_POOL_SIZE ($TOKEN_REASON)"
          python collector.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trending_latest.json data/trending_history.jsonl data/attempt_log.jsonl
          git diff --cached --quiet || git commit -m "chore: update trending data"
          git push
